<div class="container">
  <div class="loading" *ngIf="loading; else matchFound">{{ loadingText }}</div>
  <ng-template #matchFound>
    <div class="arena">
      <player #playerA [type]="PlayerType.PLAYER_A"></player>
      <player #playerB [type]="PlayerType.PLAYER_B"></player>
    </div>
  </ng-template>
</div>
